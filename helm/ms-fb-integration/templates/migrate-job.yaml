apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ms-fb-integration.tms.fullname" . }}-migrate
  labels:
    {{- include "ms-fb-integration.tms.labels" . | nindent 4 }}
  annotations:
    # Run before the app Deployment on every install/upgrade.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "ms-fb-integration.tms.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Requires the image to contain the Prisma CLI + prisma/ (schema +
          # migrations). See Dockerfile.
          command: ['npx', 'prisma', 'migrate', 'deploy']
          envFrom:
            - secretRef:
                name: {{ include "ms-fb-integration.tms.fullname" . }}-secret
