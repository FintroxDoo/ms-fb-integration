apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ms-fb-integration.tms.fullname" . }}-secret
  labels:
    {{- include "ms-fb-integration.tms.labels" . | nindent 4 }}
type: Opaque
stringData:
  # DB password — app + Prisma CLI build the connection URL from PG* env.
  PGPASSWORD: {{ .Values.postgresql.auth.password | quote }}
  FRESHBOOKS_CLIENT_ID: {{ .Values.secrets.freshbooksClientId | quote }}
  FRESHBOOKS_CLIENT_SECRET: {{ .Values.secrets.freshbooksClientSecret | quote }}
  UPFLOW_API_KEY: {{ .Values.secrets.upflowApiKey | quote }}
  UPFLOW_API_SECRET: {{ .Values.secrets.upflowApiSecret | quote }}
