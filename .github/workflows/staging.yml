name: 'Staging Deploy - FreshBooks UpFlow Integration'

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/superego

jobs:
  build_and_push_image:
    name: 'Build and Push Docker image'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Build Version
        uses: ./.github/actions/build-version

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: do-oauth-token
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN_SUPEREGO }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag and Push Docker image to DigitalOcean Container Registry
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        env:
          REGISTRY: registry.digitalocean.com/superego
          REPOSITORY: ms-fb-integration
          IMAGE_TAG: ${{ env.BUILD_VER }}

  deploy_to_kubernetes:
    name: 'Deploy to Kubernetes (staging)'
    runs-on: ubuntu-latest
    needs: build_and_push_image
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Build Version
        uses: ./.github/actions/build-version

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create .kube directory
        run: mkdir -p $HOME/.kube

      - name: Setup Kubeconfig
        run: echo "${{ secrets.DO_TMS_STAGING }}" > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install --debug --atomic --cleanup-on-fail \
            ms-fb-integration ./helm/ms-fb-integration \
            --namespace freshbooks-upflow --create-namespace \
            --set image.tag=${{ env.BUILD_VER }} \
            --set postgresql.auth.password='${{ secrets.PG_PASSWORD }}' \
            --set secrets.freshbooksClientId='${{ secrets.FRESHBOOKS_CLIENT_ID }}' \
            --set secrets.freshbooksClientSecret='${{ secrets.FRESHBOOKS_CLIENT_SECRET }}' \
            --set secrets.upflowApiKey='${{ secrets.UPFLOW_API_KEY }}' \
            --set secrets.upflowApiSecret='${{ secrets.UPFLOW_API_SECRET }}'
